<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #f5f0e8;
      --dark: #1a1710;
      --green: #2d5a27;
      --green-light: #4a8c42;
      --green-pale: #e8f0e6;
      --gold: #c9a84c;
      --gold-light: #f0d98a;
      --red: #b03a2e;
      --red-pale: #fceae8;
      --text: #2c2a24;
      --text-muted: #7a7668;
      --border: #ddd8cc;
      --white: #ffffff;
      --shadow: 0 4px 24px rgba(26,23,16,0.10);
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--dark);
      color: var(--cream);
      padding: 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .logo-block { display: flex; align-items: center; gap: 14px; }
    .logo-icon {
      width: 44px; height: 44px;
      background: var(--gold);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .logo-text h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--cream);
      line-height: 1.2;
    }
    .logo-text span {
      font-size: 0.72rem;
      color: var(--gold-light);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .header-search {
      flex: 1;
      max-width: 380px;
      position: relative;
    }
    .header-search input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      border-radius: 8px;
      border: 1.5px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.08);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .header-search input::placeholder { color: rgba(245,240,232,0.45); }
    .header-search input:focus { border-color: var(--gold); background: rgba(255,255,255,0.13); }
    .search-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: rgba(245,240,232,0.45); font-size: 16px; pointer-events: none;
    }
    .header-stats {
      display: flex; gap: 20px;
    }
    .stat { text-align: center; }
    .stat-num { font-size: 1.1rem; font-weight: 600; color: var(--gold-light); }
    .stat-label { font-size: 0.65rem; color: rgba(245,240,232,0.5); text-transform: uppercase; letter-spacing: 0.06em; }

    /* ── HERO BAND ── */
    .hero-band {
      background: linear-gradient(135deg, var(--green) 0%, #1e3d1a 100%);
      padding: 32px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero-band::before {
      content: '';
      position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .hero-band h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      color: var(--cream);
      margin-bottom: 8px;
      position: relative;
    }
    .hero-band p {
      color: rgba(245,240,232,0.7);
      font-size: 0.9rem;
      position: relative;
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      background: var(--white);
      border-bottom: 1.5px solid var(--border);
      padding: 0 24px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      gap: 4px;
      padding: 12px 0;
      white-space: nowrap;
    }
    .filter-btn {
      padding: 8px 16px;
      border-radius: 30px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s;
      display: flex; align-items: center; gap: 6px;
      white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-pale); }
    .filter-btn.active { background: var(--green); border-color: var(--green); color: white; }
    .filter-btn .cat-emoji { font-size: 1em; }

    /* ── MAIN LAYOUT ── */
    .main-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1.5px;
      background: var(--border);
    }

    /* ── GRID ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    /* ── CARD ── */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      overflow: hidden;
      transition: transform 0.18s, box-shadow 0.18s;
      display: flex;
      flex-direction: column;
      animation: fadeUp 0.35s ease both;
    }
    .card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      padding: 16px 16px 12px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .cat-avatar {
      width: 46px; height: 46px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }
    .card-title-block { flex: 1; min-width: 0; }
    .card-name {
      font-weight: 600;
      font-size: 0.97rem;
      color: var(--dark);
      line-height: 1.3;
      margin-bottom: 4px;
    }
    .tags-row { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag {
      font-size: 0.68rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    .tag-cat { background: var(--green-pale); color: var(--green); }
    .tag-morador { background: #e8f0fb; color: #2a5bad; }
    .tag-externo { background: #f3f0e8; color: #7a6a30; }

    .card-desc {
      padding: 0 16px 14px;
      font-size: 0.83rem;
      color: var(--text-muted);
      line-height: 1.5;
      flex: 1;
    }

    .card-divider { height: 1px; background: var(--border); margin: 0 16px; }

    .card-footer {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .rating-row { display: flex; align-items: center; gap: 6px; }
    .vote-btn {
      display: flex; align-items: center; gap: 4px;
      padding: 5px 10px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--text-muted);
    }
    .vote-btn.up:hover, .vote-btn.up.active { background: var(--green-pale); border-color: var(--green); color: var(--green); }
    .vote-btn.down:hover, .vote-btn.down.active { background: var(--red-pale); border-color: var(--red); color: var(--red); }
    .vote-btn .emoji { font-size: 1em; }

    .wa-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 14px;
      border-radius: 8px;
      background: #25d366;
      color: white;
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .wa-btn:hover { background: #1ebe5a; transform: scale(1.03); }
    .wa-btn svg { flex-shrink: 0; }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--text-muted);
      grid-column: 1/-1;
    }
    .empty-state .big-emoji { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.95rem; }

    /* ── NOTICE BANNER ── */
    .notice {
      background: linear-gradient(90deg, #fffbee, #fff8e1);
      border: 1.5px solid var(--gold);
      border-radius: var(--radius);
      padding: 14px 18px;
      margin-bottom: 28px;
      font-size: 0.83rem;
      color: #6b540f;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .header-stats { display: none; }
      .hero-band { padding: 22px 16px; }
      .main-wrap { padding: 20px 14px 48px; }
    }
    @media (max-width: 440px) {
      .header-inner { flex-wrap: wrap; }
      .header-search { max-width: 100%; order: 3; width: 100%; }
    }

    /* category color palettes */

    .avatar-beleza       { background: #fce4f3; }
    .avatar-manutencao   { background: #e4ecff; }
    .avatar-outros       { background: #f0ece0; }
    .avatar-saude        { background: #e0f5ec; }
    .avatar-profissional { background: #e8e0f5; }
    .avatar-transporte   { background: #e0f0f5; }
  </style>
</head>

// ─── STATE ─────────────────────────────────────────────────────────────────
let currentCat = 'all';
let searchQuery = '';
const votes = JSON.parse(localStorage.getItem('vv_votes') || '{}');

// ─── HELPERS ───────────────────────────────────────────────────────────────
function saveVotes() { localStorage.setItem('vv_votes', JSON.stringify(votes)); }

function formatPhone(phone) {
  // Remove +55 prefix and format
  let p = phone.replace(/^\+55/, '').replace(/\D/g,'');
  if (p.length === 11) return `(${p.slice(0,2)}) ${p.slice(2,7)}-${p.slice(7)}`;
  if (p.length === 10) return `(${p.slice(0,2)}) ${p.slice(2,6)}-${p.slice(6)}`;
  return phone;
}

function waLink(phone) {
  const clean = phone.replace(/\D/g,'');
  return `https://wa.me/${clean}`;
}

function catClass(cat) {
  const map = {
    'Alimentação': 'alimentacao',
    'Beleza e Bem-estar': 'beleza',
    'Manutenção e Reformas': 'manutencao',
    'Outros Serviços': 'outros',
    'Saúde e Farmácia': 'saude',
    'Serviços Profissionais': 'profissional',
    'Transporte e Logística': 'transporte',
  };
  return map[cat] || 'outros';
}

// ─── RENDER ────────────────────────────────────────────────────────────────
function renderCards() {
  const grid = document.getElementById('cardsGrid');
  const title = document.getElementById('sectionTitle');

  let filtered = services.filter(s => {
    const matchCat = currentCat === 'all' || s.cat === currentCat;
    const q = searchQuery.toLowerCase();
    const matchQ = !q || s.name.toLowerCase().includes(q) || s.cat.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  document.getElementById('totalCount').textContent = services.length;
  title.childNodes[0].textContent = currentCat === 'all' ? `Todos os Serviços (${filtered.length}) ` : `${currentCat} (${filtered.length}) `;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="big-emoji">🔍</div><p>Nenhum serviço encontrado para "<strong>${searchQuery || currentCat}</strong>".</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map((s, i) => {
    const voteKey = `v_${s.id}`;
    const upKey = `u_${s.id}`;
    const downKey = `d_${s.id}`;
    const myVote = votes[voteKey] || null;
    const upCount = votes[upKey] || 0;
    const downCount = votes[downKey] || 0;

    const phone = s.phones[0];
    const phoneDisplay = s.phones.map(formatPhone).join(' / ');

    return `
      <div class="card" style="animation-delay:${Math.min(i * 0.04, 0.4)}s">
        <div class="card-header">
          <div class="cat-avatar avatar-${catClass(s.cat)}">${s.emoji}</div>
          <div class="card-title-block">
            <div class="card-name">${s.name}</div>
            <div class="tags-row">
              <span class="tag tag-cat">${s.cat}</span>
              ${s.morador ? '<span class="tag tag-morador">👋 Morador</span>' : '<span class="tag tag-externo">🏪 Externo</span>'}
            </div>
          </div>
        </div>
        <div class="card-desc">
          ${s.desc}
          <br><small style="color:#aaa9a0;margin-top:4px;display:block">📞 ${phoneDisplay}</small>
        </div>
        <div class="card-divider"></div>
        <div class="card-footer">
          <div class="rating-row">
            <button class="vote-btn up ${myVote==='up'?'active':''}" onclick="vote(${s.id},'up',this)">
              <span class="emoji">👍</span> <span id="up-${s.id}">${upCount}</span>
            </button>
            <button class="vote-btn down ${myVote==='down'?'active':''}" onclick="vote(${s.id},'down',this)">
              <span class="emoji">👎</span> <span id="down-${s.id}">${downCount}</span>
            </button>
          </div>
          <a class="wa-btn" href="${waLink(phone)}" target="_blank" rel="noopener">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            Chamar

        </div>
      </div>
    `;
  }).join('');

// ─── VOTE ──────────────────────────────────────────────────────────────────
function vote(id, direction, btn) {
  const voteKey = `v_${id}`;
  const upKey   = `u_${id}`;
  const downKey = `d_${id}`;
  const prev = votes[voteKey];

  if (prev === direction) {
    // toggle off
    votes[voteKey] = null;
    votes[direction === 'up' ? upKey : downKey] = Math.max(0, (votes[direction === 'up' ? upKey : downKey] || 0) - 1);
  } else {
    if (prev) {
      // remove old vote
      const oldKey = prev === 'up' ? upKey : downKey;
      votes[oldKey] = Math.max(0, (votes[oldKey] || 0) - 1);
    }
    votes[voteKey] = direction;
    votes[direction === 'up' ? upKey : downKey] = (votes[direction === 'up' ? upKey : downKey] || 0) + 1;
  }
  saveVotes();
  renderCards();
}

// ─── FILTER ────────────────────────────────────────────────────────────────
function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

// ─── SEARCH ────────────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', function() {
  searchQuery = this.value;
  renderCards();
});

// ─── INIT ──────────────────────────────────────────────────────────────────
renderCards();
</script>
